services:
  rikkahub-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rikkahub-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/rikkahub
      - POSTGRES_URL=postgres://postgres:postgres@postgres:5432/rikkahub
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - WEB_PASSWORD=${WEB_PASSWORD:-rikkahub}
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - DATA_DIR=/app/data
    volumes:
      - rikkahub-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rikkahub-network

  postgres:
    image: postgres:16-alpine
    container_name: rikkahub-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=rikkahub
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rikkahub-network

volumes:
  postgres-data:
  rikkahub-data:

networks:
  rikkahub-network:
    driver: bridge